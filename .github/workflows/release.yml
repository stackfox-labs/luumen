name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (for manual runs), e.g. v1.2.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            archive: tar.gz
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            archive: tar.gz
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            archive: tar.gz
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            archive: tar.gz
          - runner: windows-latest
            goos: windows
            goarch: amd64
            archive: zip
          - runner: windows-latest
            goos: windows
            goarch: arm64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          export CGO_ENABLED=0
          export GOOS="${{ matrix.goos }}"
          export GOARCH="${{ matrix.goarch }}"

          go build -trimpath -ldflags "-s -w" -o dist/luu ./cmd/luu

          asset_name="luu-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          tar -C dist -czf "$asset_name" luu
          echo "ASSET_NAME=$asset_name" >> "$GITHUB_ENV"

      - name: Build and package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null

          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "${{ matrix.goarch }}"

          go build -trimpath -ldflags "-s -w" -o dist/luu.exe ./cmd/luu

          $assetName = "luu-windows-${{ matrix.goarch }}.zip"
          Compress-Archive -Path dist/luu.exe -DestinationPath $assetName -Force
          "ASSET_NAME=$assetName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ASSET_NAME }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums.txt
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*
